  '/productcatalog/api/RoomSelection({objectId})/AddItem/UserAction({eventId})':
    post:
      tags:
        - productCatalog
      description: Add Item to Room Selection
      operationId: addItemToRoomSelection
      parameters:
        - name: objectId
          in: path
          required: true
          schema:
            title: ObjectId
            type: string
        - name: eventId
          in: path
          required: true
          schema:
            title: EventId
            type: string
      requestBody:
        description: Body for addItemToRoomSelection operation
        content:
          application/json:
            schema:
              title: Body for addItemToRoomSelection operation
              required:
                - itemId
                - quantityCriteria
                - source
              type: object
              properties:
                itemId:
                  title: Item
                  type: string
                itemId|Name:
                  title: ItemId|Name
                  type: string
                quantity:
                  title: Quantity
                  type: number
                quantityCriteria:
                  title: Quantity Criteria
                  enum:
                    - Arbitrary
                    - MainProductArea
                    - Perimeter
                    - RoomArea
                  type: string
                  x-enum-varnames:
                    - ARBITRARY
                    - MAIN_PRODUCT_AREA
                    - PERIMETER
                    - ROOM_AREA
                  x-enum-descriptions:
                    - Specify Quantity
                    - Use Main Product Quantity
                    - Use Room Perimeter
                    - Use Room Area
                source:
                  title: Source
                  enum:
                    - Freight
                    - Item
                    - Other
                    - ProductType
                    - Room
                  type: string
                  x-enum-varnames:
                    - FREIGHT
                    - ITEM
                    - OTHER
                    - PRODUCT_TYPE
                    - ROOM
                  x-enum-descriptions:
                    - Freight
                    - Item
                    - Other
                    - Product Type
                    - Room
                uom:
                  title: UOM
                  type: string
              description: Body for addItemToRoomSelection operation
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataFormActionResponse'

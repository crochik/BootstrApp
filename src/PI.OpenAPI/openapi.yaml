            type: string
            description: Remote File Id
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                title: Response from Finish Upload
                required:
                  - Success
                type: object
                properties:
                  Message:
                    title: Message
                    type: string
                    description: Final Status
                  Success:
                    title: Success
                    type: boolean
                    description: Whether it was successful or not
                description: Response from Finish Upload
    get:

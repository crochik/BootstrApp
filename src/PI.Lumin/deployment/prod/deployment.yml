apiVersion: extensions/v1beta1
kind: Deployment
metadata:
  labels:
    name: lumin
    env: production
  name: lumin
  namespace: production
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        name: lumin
        env: production
    spec:
      containers:
      - env:
        - name: ASPNETCORE_ENVIRONMENT
          value: Production
        - name: DOTNET_PRINT_TELEMETRY_MESSAGE
          value: "false"
        image: docker.fci.cloud/lumin:040619
        imagePullPolicy: Always
        name: lumin
        resources: {}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities: {}
          privileged: false
          readOnlyRootFilesystem: false
          runAsNonRoot: false
        stdin: true
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        tty: true
        volumeMounts:
        - mountPath: /pi/dataprotection
          name: production
          subPath: dataprotection
        - mountPath: /pi/settings
          name: appsettings
          readOnly: true
      dnsPolicy: ClusterFirst
      imagePullSecrets:
      - name: docker-registry
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - name: production
        persistentVolumeClaim:
          claimName: production
      - configMap:
          defaultMode: 256
          name: lumin
          optional: false
        name: appsettings
status: {}

<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Authentication Provider</title>

    <style>
        /* Base styles, adapted from previous version */
        body {
            /* Web-safe sans-serif stack */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
            background-color: #f7fafc; /* Light gray background */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .code {
            /*position: fixed;*/
            /*bottom: 10px;*/
            /*right: 10px;*/
            margin-top: 40px;
            padding: 10px;
        }
        .code-button {
            align-items: center;
            justify-content: center;
            padding: 10px;
            font-size: 1rem;
            font-weight: 600; /* font-semibold */
            border-radius: 5px;
            border: 1px solid #7cc;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            transition: all 150ms ease-in-out;
            text-decoration: none;
        }
        .code-text {
            color: #7cc;
        }

        .alert-box {
            background-color: #fef2f2; /* bg-red-50 */
            border-left: 4px solid #f87171; /* border-l-4 border-red-400 */
            padding: 1rem; /* p-4 */
            border-radius: 0.5rem; /* rounded-lg */
            margin-bottom: 2rem; /* mb-8 */
            display: none;
        }
        .alert-content {
            display: flex; /* flex */
            align-items: flex-start; /* items-start */
        }
        .alert-icon-container {
            flex-shrink: 0; /* flex-shrink-0 */
            color: #b91c1c; /* text-red-700 */
            margin-right: 0.75rem; /* Equivalent to ml-3 in content container */
        }
        .alert-icon {
            width: 1.25rem; /* w-5 h-5 */
            height: 1.25rem;
        }
        .alert-body {
            margin-left: 0.75rem; /* ml-3 */
        }
        .alert-text-container {
            margin-top: 0.25rem; /* mt-1 */
            font-size: 0.875rem; /* text-sm */
            color: #b91c1c; /* text-red-700 */
        }
        
        /* Login Card Styles */
        .card {
            background-color: #fff;
            max-width: 448px; /* max-w-md equivalent */
            width: 100%;
            padding: 2.5rem; /* p-10 equivalent */
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); /* shadow-lg */
            border-radius: 1rem;
            border-top: 8px solid #4f46e5; /* Indigo accent for login */
            transition: all 300ms ease;
        }
        /* Header Styles */
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .title {
            font-size: 1.5rem; /* text-2xl */
            font-weight: 700; /* font-bold */
            color: #111827; /* text-gray-900 */
            margin-bottom: 0.5rem;
        }
        .subtitle {
            font-size: 1rem; /* text-base */
            color: #6b7280; /* text-gray-500 */
        }

        /* Provider Button Container */
        .provider-list {
            display: flex;
            flex-direction: column;
            gap: 1rem; /* space-y-4 */
        }

        /* Provider Button Base Style */
        .provider-button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 90%;
            padding: 0.75rem 1.25rem;
            border: 1px solid #d1d5db; /* border-gray-300 */
            font-size: 1rem;
            font-weight: 600; /* font-semibold */
            border-radius: 0.5rem;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            transition: all 150ms ease-in-out;
            text-decoration: none;
        }

        /* Hover effects */
        .provider-button:hover {
            border-color: #9ca3af; /* hover:border-gray-400 */
            background-color: #f3f4f6; /* hover:bg-gray-50 */
        }

        .provider-logo {
            width: 1.5rem; /* w-6 */
            height: 1.5rem; /* h-6 */
            margin-right: 0.75rem; /* mr-3 */
            flex-shrink: 0;
        }

        .provider-text {
            color: #1f2937; /* text-gray-800 */
        }
        
    </style>
</head>
<body>

<!-- Login Card Container -->
<div class="card">

    <!-- Header -->
    <div class="header">
        <!-- Icon placeholder - replaced with a modern login icon SVG -->
        <svg class="provider-logo mx-auto mb-2" style="width: 2rem; height: 2rem; margin-right: 0; color: #4f46e5;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path>
        </svg>
        <h1 class="title">
            Sign In to Your Account
        </h1>
        <p class="subtitle">
            Select your primary authentication provider to continue.
        </p>
    </div>

    <div class="alert-box" id="alert-box">
        <div class="alert-content">
            <div class="alert-icon-container">
                <svg class="alert-icon" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
                </svg>
            </div>
            <div class="alert-body">
                <div class="alert-text-container" id="error">
                </div>
            </div>
        </div>
    </div>
    
    <!-- Provider Buttons -->
    <div class="provider-list" id="provider-list">

        <a id="Google" href="#" onClick="startLogin('Google')" class="provider-button" style="border-color: #4285F4; background-color: #fff; color: #4285F4; display: none">
            <span class="provider-text" style="color: #4285F4;">Google</span>
        </a>

        <a id="Microsoft" href="#" onClick="startLogin('Microsoft')" class="provider-button" style="border-color: #0078D4; background-color: #fff; color: #0078D4; display: none">
            <span class="provider-text" style="color: #0078D4;">Microsoft</span>
        </a>

        <a id="Salesforce" href="#" onClick="startLogin('Salesforce')" class="provider-button" style="border-color: #00A1E0; background-color: #fff; color: #00A1E0; display: none">
            <span class="provider-text" style="color: #00A1E0;">Salesforce</span>
        </a>

        <a id="GitHub" href="#" onClick="startLogin('GitHub')" class="provider-button" style="border-color: #00A1E0; background-color: #fff; color: #00A1E0; display: none">
            <!-- GitHub Octocat Logo SVG -->
            <svg class="provider-logo" viewBox="0 0 24 24" fill="currentColor" style="color: #000;" xmlns="http://www.w3.org/2000/svg">
                <path fill-rule="evenodd" clip-rule="evenodd" d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.43 9.8 8.23 11.38.6.11.82-.26.82-.57v-2.03c-3.34.72-4.04-1.61-4.04-1.61-.55-1.4-1.34-1.78-1.34-1.78-1.09-.74.08-.72.08-.72 1.21.08 1.84 1.25 1.84 1.25 1.07 1.83 2.81 1.3 3.49 1.05.11-.82.42-1.3.76-1.6-2.67-.3-5.48-1.34-5.48-5.94 0-1.31.46-2.38 1.25-3.22-.13-.3-.54-1.52.12-3.18 0 0 1.02-.32 3.33 1.23a11.53 11.53 0 016 0c2.31-1.55 3.33-1.23 3.33-1.23.66 1.66.25 2.88.12 3.18.79.84 1.25 1.91 1.25 3.22 0 4.65-2.8 5.63-5.49 5.94.42.36.81 1.09.81 2.22v3.29c0 .31.22.68.82.57C20.57 21.8 24 17.31 24 12c0-6.63-5.37-12-12-12z"/>
            </svg>
            <span class="provider-text" style="color: #00A1E0;">GitHub</span>
        </a>

        <div id="MagicCode" class="code" style="display: none">
            <p style="font-size: 1rem; color: #777;">
                have an authentication code?
            </p>

            <form id="MagicCodeForm" action="/account/login" method="post">
                <input type="hidden" name="returnUrl" id="returnUrl"/>
                <input type="hidden" name="provider" id="provider" value="MagicCode"/>
                <label>
                    <input type="text" name="code" style="font-size: 1rem; padding: 10px; border: 1px solid #7cc; background-color: #fff "/>
                </label>
                <a  href="#" onClick="submitMagicCode()" class="code-button">
                    <span class="code-text">SUBMIT</span>
                </a>
            </form>
        </div>

    </div>


</div>

<script>
    let returnUrl;
    
    document.addEventListener("DOMContentLoaded", () => {
        const queryString = window.location.search;
        const urlParams = new URLSearchParams(queryString);
        returnUrl = urlParams.get('returnUrl');

        if (returnUrl==null) {
            showError('Missing required returnUrl parameter');
            return;
        }

        const providers = urlParams.get("providers");
        if (providers==null) {
            showError('Missing required providers parameter');
            return;
        }
        
        const list = providers.split(",");
        for (const provider of list) {
            document.getElementById(provider).style.display = "block";
        }
    });
    
    function showError(error) {
        document.getElementById("provider-list").display = "none";
        document.getElementById("alert-box").display = "block";
        document.getElementById("error").innerHTML = error;
    }
    
    function submitMagicCode() {
        document.getElementById("returnUrl").value = returnUrl;
        document.getElementById('MagicCodeForm').submit();
    }
    
    function startLogin(provider) {
        document.location.href = "account/login?provider=" + provider + "&returnUrl=" + encodeURIComponent(returnUrl);
    }
</script>

</body>
</html>
